<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-md hover:bg-primary transition-all active:scale-[0.98]" type="submit">

                        </button>
<div class="text-center pt-2">

<a class="font-label-md text-label-md text-primary hover:underline decoration-2 underline-offset-4" href="#">Resend OTP</a>
