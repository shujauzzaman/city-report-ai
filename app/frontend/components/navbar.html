<style>
    /* UI Styling to match image_1b56f6.png */
    .notification-dropdown {
        width: 320px;
        padding: 0;
        border: none;
    }
    .notification-item {
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
        white-space: normal;
        display: flex;
        align-items: start;
        transition: background 0.2s;
    }
    .notification-item:hover {
        background-color: #f8f9fa !important;
    }
    .unread-dot {
        width: 8px;
        height: 8px;
        background-color: #198754;
        border-radius: 50%;
        display: inline-block;
    }
    .icon-circle {
        width: 35px;
        height: 35px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .dropdown-toggle::after {
        display: none !important;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 breadcrumb-custom">
            <li class="breadcrumb-item">Portal</li>
            <li class="breadcrumb-item active" aria-current="page" id="currentPageName">New Report</li>
        </ol>
    </nav>
    
    <div class="dropdown">
        <button class="btn btn-light position-relative dropdown-toggle" type="button" id="notifDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end shadow notification-dropdown mt-2" aria-labelledby="notifDropdown">
            <!-- This container will be populated by JS -->
            <ul id="notification-container" class="list-unstyled mb-0"></ul>

            <!-- Footer -->
            <li class="p-2 text-center">
                <a href="notifications.html" class="text-success fw-bold small text-decoration-none d-block py-1">

                </a>
            </li>
        </ul>
    </div>
</div>
