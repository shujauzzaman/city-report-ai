<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Pakistan - Verify OTP</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Your External CSS File -->
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <style>
        /* Specific styling for the OTP input boxes */
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 5px;
            border: 1px solid var(--border-color) !important; /* Overriding theme's border-left: none */
            border-radius: 8px !important;
        }

        .otp-input:focus {
            border: 1px solid var(--accent-green) !important;
        }

        @media (max-width: 400px) {
            .otp-input {
                width: 40px;
                height: 50px;
                margin: 0 3px;
            }
        }
    </style>
</head>
<body>

<div class="flex-center mt-4 mb-4">
    <!-- Header Section (Consistent with Login/Forgot) -->
    <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3" 
             style="width: 60px; height: 60px; background-color: var(--accent-green);">
            <i class="bi bi-bank text-white fs-2"></i>
        </div>
        <h1 class="brand-title">SmartCity Pakistan</h1>
        <p class="brand-subtitle text-uppercase">Citizen Portal</p>
    </div>

    <!-- Verification Card -->
    <div class="app-card text-center" style="width: 100%; max-width: 500px;">
        <div class="mb-4">
            <h2 class="fw-bold">Verify Your Identity</h2>
            <p class="text-muted small">Enter the OTP sent to your email</p>
        </div>

        <form id="otp-form">
            <!-- OTP Input Fields -->
            <div class="d-flex justify-content-center mb-4">
                <input type="text" class="form-control otp-input" maxlength="1" required>
                <input type="text" class="form-control otp-input" maxlength="1" required>
                <input type="text" class="form-control otp-input" maxlength="1" required>
                <input type="text" class="form-control otp-input" maxlength="1" required>
                <input type="text" class="form-control otp-input" maxlength="1" required>
                <input type="text" class="form-control otp-input" maxlength="1" required>
            </div>

            <!-- Verify Button -->
            <button type="submit" class="btn-primary-brand w-100 mb-4">
                Verify
            </button>

            <!-- Resend Logic -->
            <div class="text-center pt-3">
                <p class="small text-muted mb-0">
                    Didn't receive the code? <a href="#" class="link-brand">Resend OTP</a>
                </p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("otp-form").addEventListener("submit", function(e) {
    e.preventDefault();

    // validation or API call here

    window.location.href = "../citizen/submit-complaint.html";
});
</script>

</body>
</html>
