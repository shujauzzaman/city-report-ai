<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Pakistan - Forgot Password</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Your External CSS File -->
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>

<div class="flex-center mt-4 mb-4">
    <!-- Header Section (Same as Login) -->
    <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3" 
             style="width: 60px; height: 60px; background-color: var(--accent-green);">
            <i class="bi bi-bank text-white fs-2"></i>
        </div>
        <h1 class="brand-title">SmartCity Pakistan</h1>
        <p class="brand-subtitle text-uppercase">Citizen Portal</p>
    </div>

    <!-- Forgot Password Card -->
    <div class="app-card" style="width: 100%; max-width: 500px;">
        <h2 class="fw-bold mb-3" style="font-size: 1.5rem;">Forgot Password?</h2>
        <p class="text-muted small mb-4">
            No worries! Enter the email address associated with your citizen account, and we'll send you a secure link to reset your password.
        </p>

        <form>
            <!-- Email Input -->
            <div class="mb-4">
                <label class="form-label">Official Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="e.g. name@example.com" required>
                </div>
            </div>

            <!-- Action Button -->
            <button type="submit" class="btn-primary-brand w-100 mb-4">
                <i class="bi bi-send-fill me-2"></i> Send Reset Link
            </button>

            <!-- Back to Login Navigation -->
            <div class="text-center pt-3 border-top">
                <a href="login.html" class="link-brand small d-flex align-items-center justify-content-center">
                    <i class="bi bi-arrow-left me-2"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
