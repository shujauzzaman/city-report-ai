<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Pakistan - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Your External CSS File -->
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>

<div class="flex-center mt-4 mb-4">
    <!-- Header Section -->
    <div class="text-center">
        <!-- Reusing the accent-green for the logo box manually here -->
        <div class="d-inline-flex align-items-center justify-content-center bg-success rounded-3 mb-3" style="width: 60px; height: 60px; background-color: var(--accent-green) !important;">
            <i class="bi bi-bank text-white fs-2"></i>
        </div>
        <h1 class="brand-title">SmartCity Pakistan</h1>
        <p class="brand-subtitle">Citizen Portal • Secure Access</p>
    </div>

    <!-- Login Card -->
    <div class="app-card" style="width: 100%; max-width: 450px;">
        <form>
            <!-- Email -->
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label">Password</label>
                    <a href="forgot-password.html" class="link-brand small fw-normal mb-2">Forgot Password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Checkbox -->
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small text-muted" for="remember">Keep me logged in</label>
            </div>

            <!-- Action -->
            <button type="submit" class="btn-primary-brand w-100 mb-4">
                Login to Portal <i class="bi bi-arrow-right ms-2"></i>
            </button>

            <!-- Registration -->
            <div class="text-center pt-3 border-top">
                <p class="small text-muted mb-0">
                    Don't have a citizen account? <a href="./register.html" class="link-brand">Register Now</a>
                </p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
