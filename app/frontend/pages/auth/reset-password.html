<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Pakistan - Reset Password</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Your External CSS File -->
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>

<div class="flex-center mt-4 mb-4">
    <!-- Header Section -->
    <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3" 
             style="width: 60px; height: 60px; background-color: var(--accent-green);">
            <i class="bi bi-bank text-white fs-2"></i>
        </div>
        <h1 class="brand-title">SmartCity Pakistan</h1>
    </div>

    <!-- Reset Password Card -->
    <div class="app-card" style="width: 100%; max-width: 500px;">
        <h2 class="fw-bold mb-4" style="font-size: 1.5rem;">Create New Password</h2>

        <form>
            <!-- New Password -->
            <div class="mb-4">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Password Requirements Box -->
            <div class="p-3 rounded-3 mb-4" style="background-color: var(--input-bg); border: 1px solid var(--border-color);">
                <p class="form-label mb-2" style="font-size: 0.7rem;">Password Requirements</p>
                <ul class="list-unstyled mb-0 small">
                    <li class="mb-1 text-success"><i class="bi bi-check-circle-fill me-2"></i> Minimum 12 characters</li>
                    <li class="mb-1 text-muted"><i class="bi bi-circle me-2"></i> At least one uppercase letter</li>
                    <li class="mb-0 text-muted"><i class="bi bi-circle me-2"></i> At least one number or symbol</li>
                </ul>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary-brand w-100">
                SUBMIT PASSWORD RESET <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
